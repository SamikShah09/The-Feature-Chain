<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Feature Chain — connect the rappers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0E0D12; --bg-2:#15141B; --surface:#1C1A24; --surface-2:#25222F;
    --line-faint:#3A3645;
    --ink:#F3EEE3; --ink-dim:#A7A2B3; --ink-dimmer:#6F6A7C;
    --gold:#F2C14E; --gold-bright:#FFD877; --gold-deep:#C9962F;
    --rust:#C2614A; --steel:#7FB3C4;
    --rail:8px;
    --node:118px;
    --r:14px;
    --shadow:0 18px 50px -22px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 600px at 12% -8%, #1a1726 0%, rgba(26,23,38,0) 60%),
      radial-gradient(900px 500px at 100% 0%, #15202a 0%, rgba(21,32,42,0) 55%),
      var(--bg);
    color:var(--ink);
    font-family:"Space Grotesk",system-ui,-apple-system,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 80px}

  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px}
  .brand{display:flex;flex-direction:column;gap:6px}
  .eyebrow{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-deep)}
  h1{
    font-family:"Archivo",sans-serif;font-weight:900;
    font-size:clamp(30px,5.4vw,58px);line-height:.92;letter-spacing:.01em;
    text-transform:uppercase;margin:0;color:var(--ink);
  }
  h1 .em{color:var(--gold)}
  .tag{color:var(--ink-dim);font-size:14.5px;max-width:46ch;line-height:1.45}
  .tag b{color:var(--ink);font-weight:600}

  .ctrls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  button{font-family:inherit;cursor:pointer;border:0;border-radius:11px;font-weight:600}
  .btn{
    background:var(--surface-2);color:var(--ink);border:1px solid var(--line-faint);
    padding:11px 15px;font-size:13.5px;transition:transform .12s ease,border-color .15s ease,background .15s ease;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{border-color:#544f63;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#241b07;border-color:var(--gold-deep);font-weight:700}
  .btn.gold:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent}
  .btn .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}

  .statusbar{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin:4px 0 22px;
    font-family:"Space Mono",monospace;font-size:12px;color:var(--ink-dimmer);letter-spacing:.04em}
  .statusbar .pill{padding:5px 10px;border:1px solid var(--line-faint);border-radius:999px;background:rgba(255,255,255,.02)}
  .statusbar .pill b{color:var(--ink);font-weight:700}
  .statusbar .pill.live b{color:var(--gold)}

  .board{position:relative;padding:30px 6px 8px}
  .line{
    display:flex;align-items:stretch;gap:0;flex-wrap:nowrap;overflow-x:auto;
    padding:18px 8px 30px;scrollbar-width:thin;scrollbar-color:#3a3645 transparent;
  }
  .line::-webkit-scrollbar{height:8px}
  .line::-webkit-scrollbar-thumb{background:#332f3e;border-radius:8px}

  .station{flex:0 0 var(--node);width:var(--node);display:flex;flex-direction:column;align-items:center;position:relative}
  .stationcard{
    width:100%;min-height:118px;border-radius:var(--r);padding:14px 11px;
    background:linear-gradient(180deg,var(--surface),var(--surface-2));
    border:1px solid var(--line-faint);box-shadow:var(--shadow);
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;text-align:center;position:relative;
    transition:border-color .15s ease, transform .15s ease;
  }
  .station.terminal .stationcard{min-height:150px}
  .station .marker{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase}
  .station.start .marker{color:var(--gold)}
  .station.end .marker{color:var(--steel)}
  .station.mid .marker{color:var(--ink-dimmer)}
  .station.start .stationcard{border-color:rgba(242,193,78,.55);box-shadow:0 0 0 1px rgba(242,193,78,.12),var(--shadow)}
  .station.end .stationcard{border-color:rgba(127,179,196,.55);box-shadow:0 0 0 1px rgba(127,179,196,.12),var(--shadow)}
  .aname{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;line-height:.98;
    font-size:clamp(13px,1.5vw,17px);letter-spacing:.005em;overflow-wrap:break-word;word-break:normal}
  .station.terminal .aname{font-size:clamp(15px,1.7vw,20px)}
  .nodepip{width:15px;height:15px;border-radius:50%;background:var(--bg);border:3px solid var(--ink-dimmer);margin-top:10px;z-index:2;transition:border-color .2s, background .2s, box-shadow .2s}
  .station.start .nodepip{border-color:var(--gold)}
  .station.end .nodepip{border-color:var(--steel)}
  .station.linked .nodepip{border-color:var(--gold);background:var(--gold);box-shadow:0 0 0 5px rgba(242,193,78,.16)}
  .station .remove{position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;
    background:var(--surface-2);border:1px solid var(--line-faint);color:var(--ink-dim);font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s, color .12s}
  .station.mid:hover .remove,.station.mid:focus-within .remove{opacity:1}
  .station .remove:hover{color:var(--rust);border-color:var(--rust)}

  .seg{flex:1 1 96px;min-width:96px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;padding-top:53px}
  .seg .rail{position:absolute;top:60px;left:-2px;right:-2px;height:var(--rail);border-radius:6px;background:var(--line-faint);z-index:0}
  .seg.linked .rail{background:linear-gradient(90deg,var(--gold-deep),var(--gold),var(--gold-bright));box-shadow:0 0 16px -2px rgba(242,193,78,.55)}
  .seg.broken .rail{background:transparent;border-top:3px dashed rgba(194,97,74,.6);height:0;top:63px}
  .seg .song{
    position:relative;z-index:1;max-width:150px;margin-top:-2px;
    font-family:"Space Mono",monospace;font-size:10.5px;line-height:1.3;text-align:center;
    background:var(--bg-2);border:1px solid var(--line-faint);border-radius:8px;padding:6px 9px;color:var(--ink-dim);
  }
  .seg.linked .song{color:var(--ink);border-color:rgba(242,193,78,.4)}
  .seg .song .ft{display:block;font-size:8.5px;letter-spacing:.18em;color:var(--gold-deep);text-transform:uppercase;margin-bottom:2px}
  .seg .song .more{color:var(--ink-dimmer)}
  .seg .addbtn{
    position:relative;z-index:2;width:46px;height:46px;border-radius:50%;
    background:var(--bg-2);border:2px dashed #4b4658;color:var(--ink-dim);font-size:24px;font-weight:400;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:all .15s ease;
  }
  .seg .addbtn:hover{border-color:var(--gold);color:var(--gold);transform:scale(1.06);border-style:solid}
  .seg .addhint{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dimmer);margin-top:8px}
  .seg.broken .song{border-color:rgba(194,97,74,.45);color:#c98a7b}

  .banner{margin:14px 6px 0;border-radius:16px;padding:0;max-height:0;overflow:hidden;opacity:0;
    transition:max-height .4s ease,opacity .3s ease,padding .3s ease}
  .banner.show{max-height:240px;opacity:1;padding:20px 22px;
    background:linear-gradient(120deg,rgba(242,193,78,.14),rgba(127,179,196,.08));
    border:1px solid rgba(242,193,78,.4)}
  .banner h2{font-family:"Archivo",sans-serif;font-weight:900;text-transform:uppercase;margin:0 0 4px;
    font-size:clamp(20px,3vw,30px);letter-spacing:.01em}
  .banner h2 .em{color:var(--gold)}
  .banner p{margin:0 0 14px;color:var(--ink-dim);font-size:14px}
  .banner .row{display:flex;flex-wrap:wrap;gap:10px}

  .scrim{position:fixed;inset:0;background:rgba(8,7,11,.66);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;padding:12vh 18px 18px;z-index:50}
  .scrim.show{display:flex}
  .modal{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--line-faint);
    border-radius:18px;box-shadow:var(--shadow);overflow:hidden;animation:pop .18s ease}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .mhead{padding:16px 18px 12px;border-bottom:1px solid var(--line-faint)}
  .modal .mhead .lbl{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dimmer)}
  .modal .mhead .lbl b{color:var(--gold)}
  .modal input.search{width:100%;margin-top:9px;background:var(--bg-2);border:1px solid var(--line-faint);
    border-radius:11px;padding:12px 13px;color:var(--ink);font-family:inherit;font-size:15px;outline:none}
  .modal input.search:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(242,193,78,.15)}
  .results{max-height:46vh;overflow-y:auto;padding:7px}
  .results::-webkit-scrollbar{width:9px}
  .results::-webkit-scrollbar-thumb{background:#332f3e;border-radius:8px}
  .res{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;
    background:transparent;border:1px solid transparent;border-radius:10px;padding:11px 12px;color:var(--ink);font-size:14.5px;font-weight:500}
  .res:hover,.res.active{background:var(--surface-2);border-color:var(--line-faint)}
  .res .cnt{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--ink-dimmer)}
  .res .nope{font-size:12px;color:var(--ink-dimmer)}
  .empty{padding:22px 16px;color:var(--ink-dimmer);font-size:13.5px;text-align:center}

  footer{margin-top:40px;color:var(--ink-dimmer);font-size:11.5px;font-family:"Space Mono",monospace;letter-spacing:.03em;line-height:1.7}
  footer a{color:var(--ink-dim)}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

  @media (max-width:680px){
    :root{--node:128px}
    .line{flex-direction:column;align-items:center;overflow-x:visible;gap:0}
    .station{width:min(78vw,300px);flex-basis:auto}
    .seg{width:auto;min-width:0;flex-basis:auto;padding-top:0;padding:14px 0;align-items:center}
    .seg .rail{top:0;bottom:0;left:50%;right:auto;width:var(--rail);height:auto;transform:translateX(-50%)}
    .seg.broken .rail{border-top:0;border-left:3px dashed rgba(194,97,74,.6);width:0;height:100%;left:50%}
    .seg .song,.seg .addbtn{margin:0}
    .seg .addhint{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>The&nbsp;Feature&nbsp;<span class="em">Chain</span></h1>
      <p class="tag">Two rappers. Build a route between them, one shared song at a time. Click <b>+</b> to add a stop &mdash; the rail lights up gold when a <b>feature connects</b> them.</p>
    </div>
    <div class="ctrls">
      <button class="btn ghost" id="hintBtn">Hint</button>
      <button class="btn" id="solveBtn"><span class="dot"></span>Shortest path</button>
      <button class="btn gold" id="newBtn">New matchup</button>
    </div>
  </header>

  <div class="statusbar">
    <span class="pill">Dataset: <b id="statSongs">0</b> songs &middot; <b id="statArtists">0</b> artists</span>
    <span class="pill live">Your chain: <b id="statHops">0</b> artists</span>
    <span class="pill" id="statOptimal" style="display:none">Shortest known: <b id="statOptVal">–</b></span>
  </div>

  <div class="board">
    <div class="line" id="line" aria-label="The feature chain"></div>
    <div class="banner" id="banner" role="status">
      <h2>Linked&nbsp;<span class="em" id="bannerHops"></span></h2>
      <p id="bannerSub"></p>
      <div class="row">
        <button class="btn gold" id="bannerNew">New matchup</button>
        <button class="btn" id="bannerSolve"><span class="dot"></span>Show shortest path</button>
      </div>
    </div>
  </div>

</div>

<div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-label="Add an artist">
  <div class="modal">
    <div class="mhead">
      <div class="lbl">Add a stop after <b id="afterName">—</b></div>
      <input class="search" id="search" type="text" autocomplete="off" placeholder="Search artists…" />
    </div>
    <div class="results" id="results"></div>
  </div>
</div>

,"artists":["Rick Ross","Drake","French Montana"]},{"title":"Pop That","artists":["French Montana","Rick Ross","Drake","Lil Wayne"]},{"title":"Diced Pineapples","artists":["Rick Ross","Wale","Drake"]},{"title":"Aston Martin Music","artists":["Rick Ross","Drake","Chrisette Michele"]},{"title":"Get Lucky","artists":["Daft Punk","Pharrell Williams"]},{"title":"Blurred Lines","artists":["Robin Thicke","T.I.","Pharrell Williams"]},{"title":"Live Your Life","artists":["T.I.","Rihanna"]},{"title":"Uptown Funk","artists":["Mark Ronson","Bruno Mars"]}]};

let DATA = EMBEDDED_DATA;
let ARTISTS = [];
let ADJ = new Map();
let PAIR = new Map();
let COMP = new Map();

let start = null, end = null;
let chain = [];
let solved = false;
let activeIdx = 0;

const $ = s => document.querySelector(s);
const pairKey = (a,b) => a < b ? a+"\u0000"+b : b+"\u0000"+a;
const members = s => (s.artists || []);

function buildIndex(){
  ADJ = new Map(); PAIR = new Map();
  const aset = new Set();
  for(const s of DATA.songs){
    const m = [...new Set(members(s))];
    m.forEach(a => aset.add(a));
    for(let i=0;i<m.length;i++) for(let j=i+1;j<m.length;j++){
      const a=m[i], b=m[j], k=pairKey(a,b);
      if(!ADJ.has(a)) ADJ.set(a,new Set());
      if(!ADJ.has(b)) ADJ.set(b,new Set());
      ADJ.get(a).add(b); ADJ.get(b).add(a);
      if(!PAIR.has(k)) PAIR.set(k,[]);
      if(!PAIR.get(k).includes(s.title)) PAIR.get(k).push(s.title);
    }
  }
  ARTISTS = [...aset].sort((x,y)=>x.localeCompare(y));
  COMP = new Map(); let cid=0;
  for(const n of ARTISTS){
    if(COMP.has(n)) continue;
    const stack=[n]; COMP.set(n,cid);
    while(stack.length){
      const x=stack.pop();
      for(const y of (ADJ.get(x)||[])) if(!COMP.has(y)){ COMP.set(y,cid); stack.push(y); }
    }
    cid++;
  }
  $("#statSongs").textContent = DATA.songs.length;
  $("#statArtists").textContent = ARTISTS.length;
}

function songsBetween(a,b){ return PAIR.get(pairKey(a,b)) || []; }
function linked(a,b){ return songsBetween(a,b).length>0; }

function bfsPath(src,dst){
  if(src===dst) return [src];
  const prev=new Map([[src,null]]); const q=[src];
  while(q.length){
    const x=q.shift();
    for(const y of (ADJ.get(x)||[])){
      if(!prev.has(y)){ prev.set(y,x); if(y===dst){
        const p=[]; let c=dst; while(c!==null){p.push(c); c=prev.get(c);} return p.reverse();
      } q.push(y); }
    }
  }
  return null;
}

function nodes(){ return [start, ...chain, end]; }

function artistWord(n){ return n+" artist"+(n===1?"":"s"); }

function render(){
  const ns = nodes();
  const line = $("#line"); line.innerHTML="";
  const allLinked = ns.every((n,i)=> i===0 ? true : linked(ns[i-1], ns[i]));
  const win = allLinked && ns.length>=2;

  ns.forEach((name, i)=>{
    const terminal = (i===0 || i===ns.length-1);
    const role = i===0 ? "start" : (i===ns.length-1 ? "end" : "mid");
    const st = document.createElement("div");
    st.className = "station "+role+(terminal?" terminal":"");
    const linkedNode = (i>0 && linked(ns[i-1],name)) || (i<ns.length-1 && linked(name,ns[i+1]));
    if(linkedNode) st.classList.add("linked");
    st.innerHTML = `
      <div class="stationcard">
        <span class="marker">${i===0?"Start":(i===ns.length-1?"Target":"Stop "+i)}</span>
        <span class="aname">${escapeHtml(name)}</span>
      </div>
      <div class="nodepip"></div>`;
    if(role==="mid"){
      const rm = document.createElement("button");
      rm.className="remove"; rm.title="Remove "+name; rm.setAttribute("aria-label","Remove "+name);
      rm.textContent="✕";
      rm.onclick = ()=>{ chain.splice(i-1,1); solved=false; render(); };
      st.appendChild(rm);
    }
    line.appendChild(st);

    if(i < ns.length-1){
      const a=name, b=ns[i+1];
      const songs = songsBetween(a,b);
      const isLink = songs.length>0;
      const isAddSlot = (i === ns.length-2) && !win;
      const seg = document.createElement("div");
      seg.className = "seg "+(isLink?"linked":"broken");
      const rail = `<div class="rail"></div>`;
      if(isLink){
        const more = songs.length>1 ? `<span class="more"> +${songs.length-1} more</span>` : "";
        seg.innerHTML = rail + `<div class="song"><span class="ft">feat.</span>${escapeHtml(songs[0])}${more}</div>`;
      } else if(isAddSlot){
        seg.innerHTML = rail +
          `<button class="addbtn" title="Add a stop">+</button>` +
          `<span class="addhint">add stop</span>`;
        seg.querySelector(".addbtn").onclick = ()=> openSearch(a);
      } else {
        seg.innerHTML = rail + `<div class="song">no link yet</div>`;
      }
      line.appendChild(seg);
    }
  });

  $("#statHops").textContent = chain.length;

  const banner=$("#banner");
  if(win){
    banner.classList.add("show");
    $("#bannerHops").textContent = "through "+artistWord(chain.length);
    const opt = currentOptimal();
    $("#bannerSub").textContent = solved
      ? "That's the shortest known route."
      : (opt!=null && chain.length===opt ? "And that's the shortest possible — clean." :
         (opt!=null ? `Shortest possible is ${artistWord(opt)}. Try to beat your own route.` : ""));
  } else {
    banner.classList.remove("show");
  }
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function currentOptimal(){
  if(!start||!end) return null;
  const p=bfsPath(start,end);
  return p? Math.max(0, p.length-2) : null;
}

function newMatchup(){
  const byComp={};
  for(const [n,c] of COMP) (byComp[c]=byComp[c]||[]).push(n);
  const big = Object.values(byComp).sort((a,b)=>b.length-a.length)[0];
  let a,b,p=null,tries=0;
  do{
    a = big[(Math.random()*big.length)|0];
    const dist=new Map([[a,0]]); const q=[a];
    while(q.length){const x=q.shift(); for(const y of (ADJ.get(x)||[])) if(!dist.has(y)){dist.set(y,dist.get(x)+1); q.push(y);}}
    const cand=[...dist].filter(([n,d])=>d>=2 && d<=5).map(([n])=>n);
    if(cand.length){ b=cand[(Math.random()*cand.length)|0]; }
    tries++;
  } while(!b && tries<40);
  if(!b){ b = big.find(x=>x!==a); }
  start=a; end=b; chain=[]; solved=false;
  const opt=currentOptimal();
  $("#statOptimal").style.display = "inline-block";
  $("#statOptVal").textContent = opt!=null ? artistWord(opt) : "–";
  render();
}

function solve(){
  const p=bfsPath(start,end);
  if(!p){ return; }
  chain = p.slice(1,-1);
  solved = true;
  render();
}

function hint(){
  if(solved) return;
  const ns=nodes();
  const frontier = ns[ns.length-2];
  if(linked(frontier,end)) return;
  const p=bfsPath(frontier,end);
  if(!p || p.length<2) return;
  const next=p[1];
  if(next===end) return;
  if(!chain.includes(next)) chain.push(next);
  render();
}

let searchAfter=null;
function openSearch(afterName){
  searchAfter = afterName;
  $("#afterName").textContent = afterName;
  $("#scrim").classList.add("show");
  const inp=$("#search"); inp.value=""; renderResults("");
  setTimeout(()=>inp.focus(),10);
}
function closeSearch(){ $("#scrim").classList.remove("show"); }

function candidateList(q){
  const used = new Set([start,end,...chain]);
  q=q.trim().toLowerCase();
  let list = ARTISTS.filter(a=>!used.has(a));
  if(q) list = list.filter(a=>a.toLowerCase().includes(q));
  list.sort((x,y)=>{
    const sx=x.toLowerCase().startsWith(q)?0:1, sy=y.toLowerCase().startsWith(q)?0:1;
    if(q && sx!==sy) return sx-sy;
    const cx=(ADJ.get(x)||[]).size, cy=(ADJ.get(y)||[]).size;
    if(cx!==cy) return cy-cx;
    return x.localeCompare(y);
  });
  return list.slice(0,40);
}

function renderResults(q){
  const box=$("#results"); box.innerHTML=""; activeIdx=0;
  const list=candidateList(q);
  if(!list.length){ box.innerHTML=`<div class="empty">No artist matches &ldquo;${escapeHtml(q)}&rdquo;.</div>`; return; }
  list.forEach((name,idx)=>{
    const deg=(ADJ.get(name)||[]).size;
    const b=document.createElement("button");
    b.className="res"+(idx===0?" active":"");
    b.innerHTML = `<span>${escapeHtml(name)}</span><span class="cnt">${deg} collab${deg===1?"":"s"}</span>`;
    b.onclick=()=>pick(name);
    box.appendChild(b);
  });
}

function pick(name){
  chain.push(name);
  solved=false;
  closeSearch();
  render();
}

function wire(){
  $("#newBtn").onclick = newMatchup;
  $("#bannerNew").onclick = newMatchup;
  $("#solveBtn").onclick = solve;
  $("#bannerSolve").onclick = solve;
  $("#hintBtn").onclick = hint;
  $("#search").oninput = e=>renderResults(e.target.value);
  $("#search").onkeydown = e=>{
    const items=[...document.querySelectorAll(".res")];
    if(e.key==="ArrowDown"){e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1);}
    else if(e.key==="ArrowUp"){e.preventDefault(); activeIdx=Math.max(activeIdx-1,0);}
    else if(e.key==="Enter"){e.preventDefault(); items[activeIdx]&&items[activeIdx].click(); return;}
    else if(e.key==="Escape"){closeSearch(); return;}
    items.forEach((it,i)=>it.classList.toggle("active",i===activeIdx));
    if(items[activeIdx]) items[activeIdx].scrollIntoView({block:"nearest"});
  };
  $("#scrim").onclick = e=>{ if(e.target.id==="scrim") closeSearch(); };
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSearch(); });
}

async function init(){
  try{
    const r = await fetch("data.json",{cache:"no-store"});
    if(r.ok){ const j=await r.json(); if(j && Array.isArray(j.songs) && j.songs.length) DATA=j; }
  }catch(_){ }
  buildIndex();
  wire();
  newMatchup();
}
init();
</script>
