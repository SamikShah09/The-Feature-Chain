name: Update song dataset

on:
  workflow_dispatch:        # run it manually from the GitHub Actions tab
  schedule:
    - cron: '0 3 * * 0'    # also auto-runs every Sunday at 3 AM UTC (remove if unwanted)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Crawl MusicBrainz
        run: |
          python3 build_dataset.py \
            --expand \
            --max-artists 200 \
            --user-agent "FeatureLine/1.0 ( sshah2027@outlook.com )"

      - name: Rebuild index.html
        run: python3 rebuild.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "chore: update song dataset from MusicBrainz"
          git push
